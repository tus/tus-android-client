name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - unlabeled

    runs-on: ubuntu-latest
jobs:
  android:
    strategy:
      matrix:
        java: [ '17','21' ]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'adopt'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew assemble
      - name: Run Tests
        run: ./gradlew check

  slack-on-failure:
    needs: [ android ]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TEXT: >-
            ${{ github.workflow }} failed for ${{ github.repository }} on ${{ github.ref_name }}:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node -e "process.stdout.write(JSON.stringify({ text: process.env.SLACK_TEXT }))" |
            curl --fail-with-body -X POST -H 'Content-type: application/json' --data-binary @- "$SLACK_WEBHOOK_URL"
